<!doctype html>
<html lang="es">
<head>
  <script>
    (function() {
      var redirect = new URLSearchParams(window.location.search).get('redirect');
      if (redirect) {
        window.history.replaceState(null, null, redirect);
      }
    })();
  </script>

  <meta charset="utf-8">

  <!-- TÍTULO Y DESCRIPCIÓN: lo que aparece en Google -->
  <title>Boda Almudena & Ignacio · 18 de julio de 2026</title>
  <meta name="description" content="Celebra con nosotros nuestra boda el 18 de julio de 2026. Confirma tu asistencia y consulta todos los detalles del gran día." />

  <!-- CANONICAL: le dice a Google cuál es la URL oficial -->
  <link rel="canonical" href="https://www.bodaalmueignacio.es/" />

  <!-- ROBOTS: permite indexación -->
  <meta name="robots" content="index, follow" />

  <!-- OPEN GRAPH: cómo se ve al compartir en WhatsApp, Instagram, etc. -->

  <meta property="og:url" content="https://www.bodaalmueignacio.es/" />
  <meta property="og:title" content="Boda Almudena & Ignacio · 18 de julio de 2026" />

  <meta property="og:locale" content="es_ES" />

</head>
