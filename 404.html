<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Algo ha fallado · Almudena & Ignacio</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">

  <script>
    (function () {
      var redirect = new URLSearchParams(window.location.search).get('redirect');
      if (redirect) {
        window.history.replaceState(null, null, redirect);
      }
    })();
  </script>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --color-crema:      #f5f0e8;
      --color-oscuro:     #0A202F;
      --color-dorado:     #b89a6a;
      --color-azul:       #51a1da;
      --color-azul-claro: #85aac5;
      --color-gris:       #6b6560;
      --color-gris-claro: #e8e2d9;
      --fuente-serif:     'Cormorant Garamond', Georgia, serif;
      --fuente-sans:      'Jost', sans-serif;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--color-crema);
      color: var(--color-oscuro);
      font-family: var(--fuente-sans);
      font-weight: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      padding: 40px 24px;
      text-align: center;
    }

    /* Decoración superior */
    .deco {
      width: 1px;
      height: 60px;
      background: var(--color-azul);
      opacity: 0.5;
      margin: 0 auto 48px;
      animation: fadeDown 1s ease both;
    }

    .pretitle {
      font-family: var(--fuente-sans);
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--color-azul-claro);
      margin-bottom: 24px;
      animation: fadeUp 0.9s ease both 0.1s;
    }

    .title {
      font-family: var(--fuente-serif);
      font-size: clamp(2.4rem, 7vw, 4rem);
      font-weight: 300;
      font-style: italic;
      line-height: 1.2;
      color: var(--color-oscuro);
      margin-bottom: 12px;
      animation: fadeUp 0.9s ease both 0.2s;
    }

    .subtitle {
      font-family: var(--fuente-serif);
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      font-style: italic;
      font-weight: 300;
      color: var(--color-gris);
      margin-bottom: 48px;
      animation: fadeUp 0.9s ease both 0.3s;
    }

    /* Separador */
    .divider {
      height: 1px;
      background: var(--color-azul);
      opacity: 0.3;
      width: 200px;
      margin: 0 auto 48px;
      animation: fadeUp 0.9s ease both 0.4s;
    }

    .message {
      font-family: var(--fuente-sans);
      font-size: 0.9rem;
      font-weight: 300;
      line-height: 1.9;
      color: var(--color-gris);
      max-width: 380px;
      margin: 0 auto 40px;
      animation: fadeUp 0.9s ease both 0.5s;
    }

    .phone-block {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      animation: fadeUp 0.9s ease both 0.6s;
    }

    .phone-label {
      font-family: var(--fuente-sans);
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--color-azul);
    }

    .phone-link {
      font-family: var(--fuente-serif);
      font-size: clamp(1.4rem, 4vw, 1.8rem);
      font-weight: 300;
      font-style: italic;
      color: var(--color-oscuro);
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: color 0.3s ease;
    }

    .phone-link:hover {
      color: var(--color-azul);
    }

    .thanks {
      margin-top: 56px;
      font-family: var(--fuente-sans);
      font-size: 0.75rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(10, 32, 47, 0.3);
      animation: fadeUp 0.9s ease both 0.7s;
    }

    /* Decoración inferior */
    .deco-bottom {
      width: 1px;
      height: 60px;
      background: var(--color-azul);
      opacity: 0.5;
      margin: 48px auto 0;
      animation: fadeUp 0.9s ease both 0.8s;
    }

    /* Firma */
    .brand {
      margin-top: 48px;
      font-family: var(--fuente-serif);
      font-size: 1.1rem;
      font-style: italic;
      font-weight: 300;
      color: var(--color-dorado);
      opacity: 0.7;
      animation: fadeUp 0.9s ease both 0.9s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: scaleY(0); transform-origin: top; }
      to   { opacity: 0.5; transform: scaleY(1); transform-origin: top; }
    }
  </style>
</head>
<body>

  <div class="deco"></div>

  <p class="pretitle">Error inesperado</p>

  <h1 class="title">¡Vaya! Algo ha fallado.</h1>
  <p class="subtitle">Lo sentimos mucho.</p>

  <div class="divider"></div>

  <p class="message">
    Por favor, escribe a Ignacio para avisarle<br>y lo resolveremos lo antes posible.
  </p>

  <div class="phone-block">
    <span class="phone-label">Contacto</span>
    <a class="phone-link" href="tel:+34629387513">629 38 75 13</a>
  </div>

  <p class="thanks">¡Gracias!</p>

  <div class="deco-bottom"></div>

  <p class="brand">Almudena &amp; Ignacio</p>

</body>
</html>
